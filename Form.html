<body>
    
    <form action="my-server-file.php" id="myform" name="myform" enctype="multipart/form-data">

        <!-- text field-->
        <label for="first-name">First Name</label>
<input type="text" name="fName" id="first-name" required />
  <br />

<!-- drop down menue -->
 <label for="colors">Choose a Color</label>
 <select name="colors" id="colors" required>
    <option value="">select</option>
    <option value="white">white</option>
    <option value="red">red</option>
    <option value="blue">blue</option>
    <option value="purple">purple</option>
    <option value="yellow">yellow</option>
 </select>
<br />

 <!-- radio buttons -->
  <strong>Yes or No?</strong><br />

  <input type="radio" name="myDecision" id="myRadio" value="no" />no<br />
<br />

<!-- checkbox -->
 <strong>Pick all that apply</strong>
<input type="checkbox" name="myDecisionCheckbox" id="myCheckbox-yes" value="Yes" required /><label for="myCheckbox-yes"> Yes</label></label><br />
<input type="checkbox" name="myDecisionCheckbox" id="myCheckbox-no" value="No" /><label for="myCheckbox-no"> No </label>
<br />

 <input type="submit" value="Submit Form" id="submit"/>
</form>
